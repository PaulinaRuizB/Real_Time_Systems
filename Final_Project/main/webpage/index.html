<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Control System</title>

    <link rel="stylesheet" href="app.css">
</head>

<body>

    <header>
        <h1>Environmental Control System</h1>
        <p>Real-Time Monitoring and Control Dashboard</p>
    </header>

    <main class="dashboard">

        <!-- STATUS -->
        <section class="card">
            <h2>System Status</h2>

            <div class="status-grid">

                <div class="status-item">
                    <span>Temperature</span>
                    <strong>24.5 °C</strong>
                </div>

                <div class="status-item">
                    <span>Fan Speed</span>
                    <strong>45 %</strong>
                </div>

                <div class="status-item">
                    <span>Curtain Position</span>
                    <strong>70 %</strong>
                </div>

                <div class="status-item">
                    <span>System</span>
                    <strong class="online">ONLINE</strong>
                </div>

            </div>
        </section>

        <!-- FAN -->
        <section class="card">
            <h2>Fan Control</h2>

            <label>Mode</label>

            <div class="button-group">
                <button>Automatic</button>
                <button>Manual</button>
            </div>

            <label>Fan Speed (%)</label>
            <input type="range" min="0" max="100" value="45">

            <label>Desired Temperature (°C)</label>
            <input type="number" placeholder="25">

            <label>Maximum Temperature (°C)</label>
            <input type="number" placeholder="35">

            <button class="primary-btn">Apply Settings</button>
        </section>

        <!-- CURTAIN -->
        <section class="card">
            <h2>Curtain Control</h2>

            <label>Opening Percentage (%)</label>

            <input
                type="number"
                id="curtainPosition"
                min="0"
                max="100"
                value="50">

            <button
                id="curtainBtn"
                class="primary-btn">
                Set Position
            </button>
        </section>

        <!-- SCHEDULE -->
        <section class="card">
            <h2>Curtain Schedule</h2>

            <label>Register Number</label>
            <select id="selectNumber">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>

            <label>Hour (00-23)</label>
            <input 
                type="number" 
                id="hours"
                min="0" 
                max="23"
                placeholder="00">

            <label>Minutes (00-59)</label>
            <input 
                type="number" 
                id="minutes"
                min="0" 
                max="59"
                placeholder="00">

            <label>Opening (%)</label>
            <input 
                type="number" 
                id="openingPercentage"
                min="0" 
                max="100"
                placeholder="50">

            <button 
                id="addScheduleBtn"
                onclick="send_register()"
                class="primary-btn">
                Add Schedule
            </button>

            <div id="schedule_status"></div>

            <button id="eraseScheduleBtn" class="secondary-btn">
                Erase Register
            </button>

        </section>

        <!-- RGB -->
        <section class="card">
            <h2>RGB Lighting</h2>

            <label>Select Color</label>
            <input type="color" value="#1FC9BA">

            <label>Brightness (%)</label>
            <input type="range" min="0" max="100" value="80">

            <button class="primary-btn">Apply Color</button>
        </section>

        <!-- WIFI -->
        <section class="card">
            <h2>WiFi Configuration</h2>

            <h3>Station Mode</h3>

            <input type="text" id="connect_ssid" placeholder="SSID">
            <input type="password" id="connect_pass" placeholder="Password">
            
            <div id="wifi_connect_credentials_errors"></div>
            <div id="wifi_connect_status"></div>
            
            <button id="connect_wifi" class="primary-btn">
                Connect
            </button>

            <hr>

            <h3>Access Point</h3>

            <input type="text" id="ap_ssid" placeholder="AP Name">
            <input type="password" id="ap_pass"placeholder="AP Password">
            <div id="ap_status"></div>

            <button onclick="updateAP()" class="primary-btn">Update AP</button>
            
        </section>

        <!-- OTA -->
        <section class="card">
            <h2>OTA Firmware Update</h2>

            <input type="file">

            <button class="primary-btn">Upload Firmware</button>
        </section>

    </main>

    <script src="jquery-3.3.1.min.js"></script>
    <script src="app.js"></script>

</body>

</html>
